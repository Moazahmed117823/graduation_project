name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    tags:
      - "v.*.*.*"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo & Codebase
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.14.6"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          pip install -r requirements.txt

      - name: Lint Codebase
        run: flake8 src/ --count --max-line-length=120 --ignore=E501,F824,W503,W504,E302 --show-source --statistics

      - name: Test Codebase
        run: pytest || echo "No tests configured yet"

  docker-build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo & Codebase
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Images
        env:
          GIT_SHA: ${{ github.sha }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          docker compose -f src/docker-compose.yml build
          docker tag ${DOCKERHUB_USERNAME}/graduation-project-backend:latest ${DOCKERHUB_USERNAME}/graduation-project-backend:${GIT_SHA}
          docker tag ${DOCKERHUB_USERNAME}/graduation-project-frontend:latest ${DOCKERHUB_USERNAME}/graduation-project-frontend:${GIT_SHA}
          docker compose -f src/docker-compose.yml push
          docker push ${DOCKERHUB_USERNAME}/graduation-project-backend:${GIT_SHA}
          docker push ${DOCKERHUB_USERNAME}/graduation-project-frontend:${GIT_SHA}

  release:
    needs: docker-build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo & Codebase
        uses: actions/checkout@v7

      - name: Create Github Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
